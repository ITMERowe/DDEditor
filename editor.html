<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Darkest Dungeon Save JSON Editor</title>
    <style>
      @font-face {
        font-family: "IM Fell English SC";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: local("IM Fell English SC"), local("IMFellEnglishSC-Regular");
      }
      :root {
        --bg: #07080a;
        --bg2: #0a0b0d;
        --panel: #0d0e10;
        --line: #1a1c1f;
        --line2: #25282c;
        --red: #8a1c1c;
        --red2: #b52a2a;
        --gold: #8a7350;
        --gold2: #a68b5b;
        --goldDim: #5c4d35;
        --text: #c4b8a5;
        --textBright: #e0d5c5;
        --muted: #6a6358;
        --dim: #4a453d;
        --green: #5a7a4a;
        --greenBright: #7a9a6a;
        --input-bg: #0a0b0c;
        --input-border: #1e2023;
        --gap: 12px;
        --pad: clamp(10px, 1.4vw, 22px);
        --sidebar: clamp(250px, 22vw, 320px);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: "IM Fell English SC", Georgia, serif;
        background: var(--bg);
        color: var(--text);
        font-size: 14px;
      }
      .container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        background: var(--bg);
        overflow: hidden;
      }
      .hidden {
        display: none !important;
      }
      button,
      input,
      select,
      textarea {
        font-family: inherit;
      }
      button,
      .upload-area,
      .info-item,
      .search,
      .hero-card,
      .rank-icon,
      .field,
      .field input,
      .field select,
      .section,
      .basic-card,
      .quirk-section,
      .trinket-section,
      .skills-section,
      .quirk-count,
      .quirk-slot,
      .quirk-toggle,
      .basic-skill-square,
      .skill-mode-btn,
      .skill-empty,
      .json-panel textarea,
      .notes {
        border-radius: 0 !important;
      }
      .topbar {
        min-height: 60px;
        display: grid;
        grid-template-columns: minmax(220px, 340px) minmax(0, 1fr);
        align-items: center;
        gap: 12px;
        padding: 8px var(--pad);
        background: linear-gradient(180deg, #0c0d0f, #07080a);
        border-bottom: 2px solid var(--line);
        flex-shrink: 0;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }
      .brand > div:last-child {
        min-width: 0;
      }
      .sigil {
        width: 40px;
        height: 40px;
        position: relative;
        display: grid;
        place-items: center;
        flex: 0 0 40px;
      }
      .sigil:after {
        content: "";
        position: absolute;
        inset: 0;
        border: 2px solid var(--red);
        border-radius: 50%;
        transform: rotate(45deg);
        opacity: 0.5;
      }
      .sigil:before {
        content: "⚔";
        width: 32px;
        height: 32px;
        border: 2px solid var(--red);
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: var(--red);
        font-size: 16px;
        z-index: 1;
      }
      h1 {
        font-size: clamp(16px, 1.6vw, 22px);
        color: var(--textBright);
        line-height: 1.1;
        letter-spacing: 1px;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .subtitle {
        font-size: clamp(10px, 0.9vw, 12px);
        color: var(--gold2);
        font-weight: 700;
        margin-top: 2px;
        letter-spacing: 0.5px;
      }
      .controls {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: flex-end;
        flex-wrap: wrap;
        min-width: 0;
      }
      button {
        height: 34px;
        padding: 0 14px;
        border: 1px solid var(--line2);
        background: linear-gradient(180deg, #1a1c1f, #0f1012);
        color: var(--text);
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        white-space: nowrap;
        letter-spacing: 0.5px;
        transition: all 0.15s;
      }
      button:hover {
        background: linear-gradient(180deg, #22252a, #15171a);
        border-color: var(--goldDim);
        color: var(--textBright);
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        filter: grayscale(0.35);
        background: linear-gradient(180deg, #111214, #0a0b0c);
        border-color: var(--line);
        color: var(--dim);
      }
      #clearBtn {
        width: 34px;
        padding: 0;
        font-size: 16px;
        flex: 0 0 34px;
      }
      .upload-area {
        margin: 16px var(--pad);
        padding: clamp(14px, 2vw, 22px);
        text-align: center;
        cursor: pointer;
        color: var(--muted);
        background: linear-gradient(
          180deg,
          rgba(10, 12, 14, 0.9),
          rgba(5, 6, 8, 0.9)
        );
        border: 1px dashed var(--line2);
        flex-shrink: 0;
      }
      .upload-area:hover,
      .upload-area.dragover {
        border-color: var(--red);
        background: rgba(138, 28, 28, 0.08);
      }
      .upload-icon {
        display: none;
      }
      .upload-text {
        font-size: 15px;
        font-weight: 800;
        color: var(--gold2);
        letter-spacing: 0.5px;
      }
      .upload-subtext {
        font-size: 12px;
        color: var(--dim);
        margin-top: 4px;
      }
      #fileInput {
        display: none;
      }
      .info-panel {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
        margin: 12px var(--pad) 10px;
        flex-shrink: 0;
      }
      .info-item {
        padding: 8px 11px;
        background: linear-gradient(
          180deg,
          rgba(12, 14, 16, 0.95),
          rgba(7, 8, 10, 0.95)
        );
        border: 1px solid var(--line);
        min-width: 0;
      }
      .info-label {
        display: block;
        color: var(--dim);
        font-size: 9px;
        text-transform: uppercase;
        font-weight: 900;
        letter-spacing: 1px;
      }
      .info-value {
        display: block;
        color: var(--gold2);
        margin-top: 3px;
        font-size: 12px;
        word-break: break-word;
      }
      .app {
        display: grid;
        grid-template-columns: var(--sidebar) minmax(0, 1fr);
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }
      .panel {
        background: var(--bg2);
        border-right: 1px solid var(--line);
        padding: 14px 16px;
        min-height: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      #mainPanel {
        min-width: 0;
        padding: 18px var(--pad) 48px;
        background: var(--bg);
        border-right: 0;
        overflow: auto;
      }
      .panel-title {
        font-size: 13px;
        font-weight: 800;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 10px;
      }
      .search {
        width: 100%;
        height: 34px;
        padding: 0 12px;
        background: var(--input-bg);
        border: 1px solid var(--input-border);
        color: var(--text);
        font-size: 14px;
        margin-bottom: 10px;
      }
      .search:focus,
      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: var(--goldDim);
        box-shadow: 0 0 0 1px rgba(138, 115, 80, 0.15);
      }
      .hero-list {
        flex: 1;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-height: 0;
      }
      .hero-card {
        display: grid;
        grid-template-columns: minmax(28px, 40px) minmax(0, 1fr) minmax(
            54px,
            66px
          );
        grid-template-areas: "num name weapon" "num class armour";
        column-gap: 9px;
        row-gap: 3px;
        align-items: center;
        min-height: 58px;
        padding: 8px 12px;
        border: 1px solid transparent;
        background: #0e0f11;
        cursor: pointer;
        transition: all 0.15s;
        overflow: hidden;
      }
      .hero-card:hover {
        background: #131518;
        border-color: var(--line2);
      }
      .hero-card.active {
        background: linear-gradient(
          90deg,
          rgba(80, 20, 20, 0.4),
          rgba(40, 10, 10, 0.3)
        );
        border-color: #6e2020;
        box-shadow: inset 0 0 20px rgba(160, 40, 40, 0.08);
      }
      .hero-no {
        grid-area: num;
        align-self: start;
        color: var(--dim);
        font-size: 10px;
        font-weight: 900;
        line-height: 1;
        padding-top: 3px;
        white-space: nowrap;
      }
      .hero-name {
        grid-area: name;
        font-weight: 900;
        font-size: 15px;
        color: var(--textBright);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.15;
      }
      .hero-class {
        grid-area: class;
        font-size: 12px;
        color: var(--muted);
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        text-transform: capitalize;
      }
      .hero-rank {
        justify-self: end;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 5px;
        color: #b0a898;
        font-size: 11px;
        font-weight: 900;
        line-height: 1;
        white-space: nowrap;
      }
      .hero-rank.weapon {
        grid-area: weapon;
      }
      .hero-rank.armour {
        grid-area: armour;
      }
      .rank-icon {
        width: 17px;
        height: 17px;
        border: 1px solid var(--line);
        background: #141618;
        color: var(--gold);
        font-size: 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 17px;
      }
      .editor-head {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: flex-start;
        margin-bottom: 10px;
      }
      .hero-title {
        font-size: clamp(20px, 2vw, 26px);
        color: var(--textBright);
        font-weight: 400;
        line-height: 1.05;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
      }
      .hero-subtitle {
        color: var(--muted);
        margin-top: 3px;
        font-size: 12px;
      }
      .hint {
        font-size: 13px;
        color: var(--dim);
        line-height: 1.5;
        margin-bottom: 12px;
      }
      .toolbar {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .basic-layout-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: var(--gap);
        align-items: start;
        width: 100%;
      }
      .basic-left-stack,
      .basic-right-stack {
        display: grid;
        grid-template-columns: 1fr;
        grid-auto-rows: auto;
        gap: var(--gap);
        align-content: start;
        min-width: 0;
      }
      .basic-card,
      .section,
      .quirk-section {
        background: linear-gradient(180deg, #0e1012, #0a0b0d);
        border: 1px solid var(--line);
        padding: 14px 16px;
        min-width: 0;
      }
      .basic-card:hover,
      .field:hover {
        border-color: var(--line2);
      }
      .basic-card h3,
      .quirk-section-title,
      .trinket-section-title,
      .skills-title-label {
        font-size: 14px;
        line-height: 1.15;
        font-weight: 900;
        color: var(--red2);
        text-transform: uppercase;
        letter-spacing: 1.2px;
        margin-bottom: 12px;
      }
      .basic-card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
      }
      .basic-card-grid.three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .basic-card-grid.checks {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 8px 12px;
      }
      .field {
        background: transparent;
        border: 0;
        padding: 0;
        min-width: 0;
      }
      .field label {
        display: block;
        font-size: 10px;
        color: var(--gold2);
        margin-bottom: 4px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }
      .field input,
      .field select {
        width: 100%;
        height: 31px;
        padding: 0 8px;
        background: var(--input-bg);
        border: 1px solid var(--input-border);
        color: var(--text);
        font-size: 12px;
      }
      .field small {
        display: block;
        color: var(--dim);
        margin-top: 6px;
        line-height: 1.35;
        font-size: 11px;
      }
      .field input[type="number"]::-webkit-inner-spin-button,
      .field input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .field input[type="number"] {
        appearance: textfield;
        -moz-appearance: textfield;
      }
      .field.check-field,
      .field:has(input[type="checkbox"]) {
        display: flex;
        align-items: center;
        min-height: 24px;
      }
      .field.check-field label,
      .field:has(input[type="checkbox"]) label {
        display: flex;
        align-items: center;
        gap: 7px;
        margin: 0;
        font-size: 11px;
        color: var(--gold2);
        cursor: pointer;
      }
      .field input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 15px !important;
        height: 15px !important;
        min-width: 15px;
        border: 1px solid #3a3d40;
        background: var(--input-bg);
        cursor: pointer;
        display: grid;
        place-content: center;
        padding: 0;
        margin: 0;
      }
      .field input[type="checkbox"]:checked {
        border-color: var(--green);
        background: rgba(90, 122, 74, 0.15);
      }
      .field input[type="checkbox"]:checked:before {
        content: "✓";
        color: var(--greenBright);
        font-size: 11px;
        font-weight: 900;
        line-height: 1;
      }
      .skills-section,
      .trinket-section,
      .quirk-section {
        margin: 0 !important;
        height: auto;
        min-height: 0;
      }
      .skills-bar-head {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 8px;
        margin: 0 0 6px;
      }
      .skills-bar-head .skills-title-label {
        margin: 0;
      }
      .skill-mode-tabs {
        display: flex;
        gap: 4px;
        justify-self: start;
      }
      .skill-mode-btn {
        height: 22px;
        min-height: 22px;
        padding: 0 10px;
        font-size: 10px;
        background: #14171a;
        border-color: #2a2d30;
        color: var(--muted);
      }
      .skill-mode-btn.active {
        background: linear-gradient(180deg, #6a2020, #3a1010);
        border-color: var(--red);
        color: #fff;
      }
      .quirk-count {
        border: 1px solid #2a2d30;
        background: #0a0b0c;
        color: var(--gold2);
        font-size: 12px;
        padding: 3px 8px;
        white-space: nowrap;
      }
      .basic-skill-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 5px;
        width: 100%;
      }
      .basic-skill-square {
        width: 100%;
        aspect-ratio: 1/1;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, #14171a, #0e1012);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--gold2);
        font-size: clamp(14px, 2.2vw, 20px);
        font-weight: 900;
        line-height: 1;
      }
      .basic-skill-square.filled {
        border-color: #3a3d40;
        background: linear-gradient(180deg, #1a1e22, #121518);
      }
      .basic-skill-square.empty {
        color: var(--dim);
        border-style: dashed;
        background: #0a0b0c;
      }
      .skill-empty {
        width: 100%;
        border: 1px dashed var(--line2);
        padding: 12px;
        color: var(--dim);
        font-size: 13px;
      }
      .quirk-section-title,
      .trinket-section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .quirk-section-actions {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .quirk-add-btn {
        width: 22px;
        height: 22px;
        min-height: 22px;
        padding: 0;
        border: 0;
        background: transparent;
        color: var(--gold2);
        font-size: 18px;
        line-height: 1;
      }
      .quirk-add-btn:hover {
        background: transparent;
        color: var(--textBright);
        filter: drop-shadow(0 0 6px rgba(166, 139, 91, 0.45));
      }
      .quirk-slots {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      .quirk-slot {
        display: block;
        min-height: 76px;
        padding: 11px 12px;
        background: linear-gradient(180deg, #14171a, #0e1012);
        border: 1px solid var(--line);
        overflow: hidden;
      }
      .quirk-name {
        display: block;
        font-size: 15px;
        font-weight: 900;
        color: var(--textBright);
        line-height: 1.25;
        margin-bottom: 8px;
        white-space: normal;
        overflow: visible;
        text-overflow: clip;
        text-transform: capitalize;
        word-break: break-word;
      }
      .quirk-name-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }
      .quirk-name-input {
        width: 100%;
        height: 26px;
        padding: 0;
        border: 0;
        border-bottom: 1px solid transparent;
        background: transparent;
        color: var(--textBright);
        font-size: 15px;
        font-weight: 900;
        line-height: 1.25;
        text-transform: none;
      }
      .quirk-delete-btn {
        width: 22px;
        height: 22px;
        min-height: 22px;
        padding: 0;
        border: 0;
        background: transparent;
        color: var(--dim);
        font-size: 17px;
        line-height: 1;
        opacity: 0.65;
      }
      .quirk-delete-btn:hover {
        background: transparent;
        color: var(--red2);
        opacity: 1;
        filter: drop-shadow(0 0 5px rgba(181, 42, 42, 0.75));
      }
      .quirk-delete-btn:disabled {
        opacity: 0;
        pointer-events: none;
      }
      .quirk-name-input::placeholder {
        color: var(--dim);
      }
      .quirk-name-input:focus {
        border-color: var(--goldDim);
        box-shadow: none;
      }
      .quirk-slot.empty {
        opacity: 0.72;
      }
      .quirk-flags {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 8px;
        flex-wrap: wrap;
      }
      .quirk-toggle {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        padding: 0;
        border: 0;
        background: transparent;
        color: var(--dim);
        font-size: 15px;
        line-height: 1;
        cursor: pointer;
        user-select: none;
      }
      .quirk-toggle input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }
      .quirk-toggle .mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transform: translateZ(0);
        transition:
          color 0.15s ease,
          filter 0.15s ease,
          text-shadow 0.15s ease,
          transform 0.15s ease;
      }
      .quirk-toggle .mark svg {
        width: 15px;
        height: 15px;
        display: block;
        stroke: currentColor;
        fill: none;
      }
      .quirk-toggle .mark svg.fill-icon {
        fill: currentColor;
        stroke: none;
      }
      .quirk-toggle input:checked + .mark {
        color: var(--red2);
        filter: drop-shadow(0 0 3px rgba(181, 42, 42, 0.9))
          drop-shadow(0 0 9px rgba(138, 28, 28, 0.65));
        text-shadow:
          0 0 5px rgba(181, 42, 42, 0.75),
          0 0 12px rgba(138, 28, 28, 0.55);
      }
      .quirk-toggle:hover .mark {
        color: var(--gold2);
        filter: drop-shadow(0 0 5px rgba(166, 139, 91, 0.35));
        transform: scale(1.08);
      }
      .quirk-toggle:hover input:checked + .mark {
        color: #d84545;
        filter: drop-shadow(0 0 4px rgba(216, 69, 69, 0.95))
          drop-shadow(0 0 12px rgba(181, 42, 42, 0.7));
        text-shadow:
          0 0 7px rgba(216, 69, 69, 0.85),
          0 0 16px rgba(181, 42, 42, 0.65);
      }
      .quirk-kind,
      .quirk-slot-no {
        display: none !important;
      }
      .trinket-list {
        display: grid;
        grid-template-columns: 1fr;
        gap: 7px;
      }
      .trinket-row {
        display: grid;
        grid-template-columns: 54px minmax(0, 1fr) minmax(0, 0.75fr);
        gap: 8px;
        align-items: end;
      }
      .trinket-row.empty {
        opacity: 0.55;
      }
      .trinket-row.empty input {
        color: var(--dim);

      function normalizeQuirkName(name) {

      function getQuirkSlotNames() {
        const h = selectedHeroId ? getHeroRoot(selectedHeroId) : null;
        const slotNames = {};

        document.querySelectorAll(".quirk-name-input").forEach((el) => {
          const slot = el.dataset.quirkSlot;
          const originalName = normalizeQuirkName(el.dataset.originalQuirk);
          const typedName = normalizeQuirkName(el.value);

          // During typing, keep using the committed/original name so every
          // partial letter does not create a new quirk in the JSON.
          if (h?.quirks?.[originalName]) {
            slotNames[slot] = originalName;
          } else if (h?.quirks?.[typedName]) {
            slotNames[slot] = typedName;
          } else {
            slotNames[slot] = typedName;
          }
        });

        return slotNames;

      function commitQuirkNameInput(inputEl) {
        if (!selectedHeroId || !inputEl) return;

        const h = getHeroRoot(selectedHeroId);
        if (!h) return;

        h.quirks = h.quirks || {};

        const originalName = normalizeQuirkName(inputEl.dataset.originalQuirk);
        const newName = normalizeQuirkName(inputEl.value);

        if (!originalName && !newName) return;

        if (!originalName && newName) {
          if (!h.quirks[newName]) h.quirks[newName] = makeDefaultQuirk();
          inputEl.dataset.originalQuirk = newName;
          updateQuirkDeleteButton(inputEl, newName);
          document.getElementById("jsonEditor").value = JSON.stringify(rosterData, null, 2);
          renderHeroList();
          return;
        }

        if (originalName && !newName) {
          delete h.quirks[originalName];
          inputEl.dataset.originalQuirk = "";
          updateQuirkDeleteButton(inputEl, "");
          document.getElementById("jsonEditor").value = JSON.stringify(rosterData, null, 2);
          renderHeroList();
          renderHeroEditor();
          return;
        }

        if (originalName !== newName && h.quirks[originalName]) {
          const existingValue = h.quirks[originalName];
          delete h.quirks[originalName];
          h.quirks[newName] = existingValue;
          inputEl.dataset.originalQuirk = newName;
          updateQuirkDeleteButton(inputEl, newName);
          document.getElementById("jsonEditor").value = JSON.stringify(rosterData, null, 2);
          renderHeroList();
        }
      }

        return v;
      }
      document.getElementById("chooseBtn").onclick = () =>
        document.getElementById("fileInput").click();
      document.getElementById("fileInput").onchange = (e) => {
        if (e.target.files.length) handleFile(e.target.files[0]);
      };
      const uploadArea2 = document.getElementById("uploadArea");
      uploadArea2.onclick = () => document.getElementById("fileInput").click();
      uploadArea2.ondragover = (e) => {
        e.preventDefault();
        uploadArea2.classList.add("dragover");
      };
      uploadArea2.ondragleave = () => uploadArea2.classList.remove("dragover");
      uploadArea2.ondrop = (e) => {
        e.preventDefault();
        uploadArea2.classList.remove("dragover");
        if (e.dataTransfer.files.length)
          handleFile(e.dataTransfer.files[0]);
      };
      document.getElementById("heroSearch").oninput = renderHeroList;
      document.getElementById("heroEditor").addEventListener("input", (event) => {
        if (event.target?.classList?.contains("quirk-name-input")) return;
        autoApplyHeroChanges();
      });
      document.getElementById("heroEditor").addEventListener("change", (event) => {
        if (event.target?.classList?.contains("quirk-name-input")) return;
        autoApplyHeroChanges();
      });
      document.getElementById("advancedBtn").onclick = () => {
        setAdvancedVisible(!showAdvanced);
      };
      document.getElementById("syncFromJsonBtn").onclick = () => {
        try {
          rosterData = JSON.parse(document.getElementById("jsonEditor").value);
          isRosterMode = isRosterData(rosterData);
          selectedHeroId = null;
          document.getElementById("heroCount").textContent = isRosterMode
            ? Object.keys(getHeroesObj()).length
            : "N/A";
          document.getElementById("fileModeLabel").textContent = isRosterMode
            ? "persist.roster.json"
            : "Generic JSON Editor";
          if (isRosterMode) {
            document.querySelector(".panel-title").textContent = "Heroes";
            document.getElementById("heroSearch").classList.remove("hidden");
            document.getElementById("heroList").classList.remove("hidden");
            document.getElementById("emptyHero").textContent = "";
            renderHeroList();
            renderHeroEditor();
          } else {
            document.querySelector(".panel-title").textContent = "JSON";
            document.getElementById("heroSearch").classList.add("hidden");
            document.getElementById("heroList").classList.add("hidden");
            document.getElementById("heroList").innerHTML = "";
            document.getElementById("emptyHero").classList.add("hidden");
            document.getElementById("heroEditor").classList.add("hidden");
          }
        } catch (e) {}
      };
      document.getElementById("syncToJsonBtn").onclick = () => {
        commitAllQuirkNameInputs();
        document.getElementById("jsonEditor").value = JSON.stringify(
          rosterData,
          null,
          2,
        );
      };
      document.getElementById("exportDsonBtn").onclick = () => {
        try {
          commitAllQuirkNameInputs();
          const v = validateEditedJson(rosterData);
          if (!v.ok) return;
          const out = buildDSON(rosterData);
          let base = (
            document.getElementById("fileName").textContent || "persist.roster"
          ).replace(/\.[^/.]+$/, "");
          downloadBlob(out, base + "_recoded.json", "application/octet-stream");
        } catch (e) {
          console.error(e);
        }
      };
      document.getElementById("clearBtn").onclick = () => {
        state = null;
        rosterData = null;
        selectedHeroId = null;
        isRosterMode = false;
        setAdvancedVisible(false);
        document.getElementById("fileModeLabel").textContent = "Roster UI / JSON Editor";
        document.getElementById("fileInput").value = "";
        document.getElementById("infoPanel").classList.add("hidden");
        document.getElementById("app").classList.add("hidden");
        document.getElementById("uploadArea").classList.remove("hidden");
        ["advancedBtn", "exportDsonBtn"].forEach(
          (id) => (document.getElementById(id).disabled = true),
        );
      };
    </script>
  </body>
</html>
